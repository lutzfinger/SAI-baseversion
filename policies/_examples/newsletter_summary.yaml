policy_id: newsletter_summary
version: "1"
description: Daily newsletter Slack summary workflow with controlled Slack posting and Gmail archiving.
default_mode: deny
redaction:
  snippet_max_chars: 160
  full_redaction_keys:
    - access_token
    - authorization
    - cookie
    - cookies
    - password
    - refresh_token
    - token
  masked_email_keys:
    - bcc
    - cc
    - delivered_to
    - email
    - from_email
    - sender
    - to
  truncated_keys:
    - body
    - body_excerpt
    - reasoning
    - snippet
    - subject
  input_guard:
    fail_closed: false
    max_snippet_chars_for_llm: 500
    max_body_chars_for_llm: 1500
  output_guard:
    max_reason_chars: 240
    enforce_message_id_match: true
  evaluator:
    key: classification_consistency
gmail:
  allowed_env_keys:
    credentials_path: SAI_GMAIL_CREDENTIALS_PATH
    client_id: SAI_GMAIL_CLIENT_ID
    client_secret: SAI_GMAIL_CLIENT_SECRET
    refresh_token: SAI_GMAIL_REFRESH_TOKEN
    token_path: SAI_GMAIL_NEWSLETTER_SUMMARY_TOKEN_PATH
  default_token_filename: newsletter_summary_token.json
  allowed_mailbox_domains:
    - example_user.com
  allowed_mailbox_accounts:
    - someone@example.com
  allowed_scopes:
    - https://www.googleapis.com/auth/gmail.modify
slack:
  allowed_env_keys:
    bot_token: SAI_SLACK_BOT_TOKEN
  allowed_channel_names:
    - newsletters
    - #general
rules:
  - action: connector.gmail.authenticate
    mode: allow
    reason: The operator explicitly authorizes Gmail access for newsletter summaries.
  - action: connector.gmail.read_metadata
    mode: allow
    reason: Newsletter classification needs email metadata.
  - action: connector.gmail.read_snippet
    mode: allow
    reason: Newsletter classification needs snippet text.
  - action: connector.gmail.read_body
    mode: allow
    reason: Newsletter summarization needs bounded body excerpts.
  - action: connector.gmail.archive_thread
    mode: allow
    reason: After successful summary delivery, the workflow archives the newsletter thread.
  - action: connector.slack.authenticate
    mode: allow
    reason: The workflow uses an explicit Slack bot token to post summaries.
  - action: connector.slack.read_channel_metadata
    mode: allow
    reason: Resolving the configured channel name may require channel metadata lookup.
  - action: connector.slack.post_message
    mode: allow
    reason: The workflow posts one short Slack summary per newsletter.
  - action: prompts.*
    mode: deny
    reason: Runtime workflows must never modify prompts.
  - action: policies.*
    mode: deny
    reason: Runtime workflows must never modify policies.
