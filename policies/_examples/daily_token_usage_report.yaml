policy_id: daily_token_usage_report
version: "1"
description: Daily token-usage reporting to Slack with read-only observability access.
default_mode: deny
redaction:
  full_redaction_keys:
    - access_token
    - authorization
    - cookie
    - cookies
    - password
    - refresh_token
    - token
  truncated_keys:
    - error
    - note
slack:
  allowed_env_keys:
    bot_token: SAI_SLACK_BOT_TOKEN
  allowed_channel_names:
    - #general
    - #general
rules:
  - action: observability.audit.read
    mode: allow
    reason: The workflow reads one day of append-only audit events to aggregate token usage.
  - action: observability.langsmith.read
    mode: allow
    reason: The workflow reads one day of LangSmith traces to identify unmatched tokenized runs.
  - action: connector.slack.authenticate
    mode: allow
    reason: The workflow posts one daily token summary to Slack.
  - action: connector.slack.read_channel_metadata
    mode: allow
    reason: Resolving the configured Slack channel name may require metadata lookup.
  - action: connector.slack.post_message
    mode: allow
    reason: The workflow posts one daily token summary to Slack.
  - action: prompts.*
    mode: deny
    reason: Runtime workflows must never modify prompts.
  - action: policies.*
    mode: deny
    reason: Runtime workflows must never modify policies.
