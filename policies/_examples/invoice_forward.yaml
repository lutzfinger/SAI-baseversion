policy_id: invoice_forward
version: "1"
description: Forward tagged allowlisted invoice receipts to the configured QuickBooks intake mailbox.
default_mode: deny
redaction:
  snippet_max_chars: 160
  full_redaction_keys:
    - access_token
    - authorization
    - cookie
    - cookies
    - password
    - refresh_token
    - token
  masked_email_keys:
    - bcc
    - cc
    - delivered_to
    - email
    - from_email
    - sender
    - to
  truncated_keys:
    - body
    - body_excerpt
    - reasoning
    - snippet
    - subject
gmail:
  allowed_env_keys:
    credentials_path: SAI_GMAIL_CREDENTIALS_PATH
    client_id: SAI_GMAIL_CLIENT_ID
    client_secret: SAI_GMAIL_CLIENT_SECRET
    refresh_token: SAI_GMAIL_REFRESH_TOKEN
    token_path: SAI_GMAIL_NEWSLETTER_TOKEN_PATH
  default_token_filename: newsletter_unsubscribe_token.json
  allowed_mailbox_domains:
    - example_user.com
  allowed_mailbox_accounts:
    - someone@example.com
  allowed_scopes:
    - https://www.googleapis.com/auth/gmail.readonly
    - https://www.googleapis.com/auth/gmail.send
rules:
  - action: connector.gmail.authenticate
    mode: allow
    reason: The operator has already authorized the Gmail mailbox for controlled invoice filing.
  - action: connector.gmail.read_metadata
    mode: allow
    reason: Tagged invoice filing needs sender and header metadata.
  - action: connector.gmail.read_snippet
    mode: allow
    reason: Tagged invoice filing needs bounded snippet text for safe forwarding context.
  - action: connector.gmail.read_body
    mode: allow
    reason: Tagged invoice filing needs a bounded body excerpt for the forwarded copy.
  - action: connector.gmail.send_message
    mode: allow
    reason: Filing receipts with QuickBooks requires sending a controlled forwarded email copy.
  - action: prompts.*
    mode: deny
    reason: Runtime workflows must never modify prompts.
  - action: policies.*
    mode: deny
    reason: Runtime workflows must never modify policies.
