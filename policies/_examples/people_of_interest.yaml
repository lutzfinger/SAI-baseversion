policy_id: people_of_interest
version: "1"
description: Weekly OpenAI web-search monitoring for the curated people-of-interest list.
default_mode: deny
slack:
  allowed_channel_names:
    - #general
rules:
  - action: provider.openai.web_search
    mode: allow
    reason: The workflow performs one bounded OpenAI web search per monitored person.
  - action: connector.slack.authenticate
    mode: allow
    reason: The workflow posts one weekly summary to Slack.
  - action: connector.slack.read_channel_metadata
    mode: allow
    reason: Slack channel resolution may require metadata lookup.
  - action: connector.slack.post_message
    mode: allow
    reason: The workflow posts the weekly people-of-interest summary to Slack.
