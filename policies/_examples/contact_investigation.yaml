policy_id: contact_investigation
version: "1"
description: Read-and-draft workflow for deeper investigation of ambiguous personal emails.
default_mode: deny
redaction:
  snippet_max_chars: 160
  full_redaction_keys:
    - access_token
    - authorization
    - cookie
    - cookies
    - password
    - refresh_token
    - token
  masked_email_keys:
    - bcc
    - cc
    - email
    - from_email
    - sender
    - to
  truncated_keys:
    - body
    - body_excerpt
    - reasoning
    - snippet
    - subject
  input_guard:
    fail_closed: false
    max_snippet_chars_for_llm: 500
    max_body_chars_for_llm: 1500
  output_guard:
    max_reason_chars: 240
    enforce_message_id_match: true
  evaluator:
    key: classification_consistency
gmail:
  allowed_env_keys:
    credentials_path: SAI_GMAIL_CREDENTIALS_PATH
    client_id: SAI_GMAIL_CLIENT_ID
    client_secret: SAI_GMAIL_CLIENT_SECRET
    refresh_token: SAI_GMAIL_REFRESH_TOKEN
    token_path: SAI_MEETING_GMAIL_TOKEN_PATH
    extra_token_paths: SAI_MEETING_EXTRA_GMAIL_TOKEN_PATHS
  default_token_filename: meeting_gmail_token.json
  allowed_mailbox_domains:
    - example_user.com
  allowed_mailbox_accounts:
    - someone@example.com
  allowed_scopes:
    - https://www.googleapis.com/auth/gmail.readonly
    - https://www.googleapis.com/auth/gmail.compose
calendar:
  allowed_env_keys:
    credentials_path: SAI_GMAIL_CREDENTIALS_PATH
    client_id: SAI_GMAIL_CLIENT_ID
    client_secret: SAI_GMAIL_CLIENT_SECRET
    refresh_token: SAI_GMAIL_REFRESH_TOKEN
    token_path: SAI_MEETING_CALENDAR_TOKEN_PATH
  default_token_filename: meeting_calendar_token.json
  allowed_scopes:
    - https://www.googleapis.com/auth/calendar.readonly
linkedin:
  allowed_env_keys:
    dataset_path: SAI_LINKEDIN_DATASET_PATH
rules:
  - action: connector.gmail.authenticate
    mode: allow
    reason: Local Gmail OAuth is explicit and operator initiated.
  - action: connector.gmail.read_metadata
    mode: allow
    reason: Contact investigation needs inbox metadata.
  - action: connector.gmail.read_snippet
    mode: allow
    reason: Contact investigation needs snippet previews.
  - action: connector.gmail.read_body
    mode: allow
    reason: Contact investigation needs bounded body excerpts.
  - action: connector.gmail.read_history
    mode: allow
    reason: Contact investigation checks prior history across configured mailbox tokens.
  - action: connector.gmail.create_draft
    mode: allow
    reason: Contact investigation writes an internal draft only and never sends automatically.
  - action: connector.gmail.send_*
    mode: deny
    reason: Contact investigation may draft notes but must never send email.
  - action: connector.calendar.authenticate
    mode: allow
    reason: Local Calendar OAuth is explicit and operator initiated.
  - action: connector.calendar.read_events
    mode: allow
    reason: Contact investigation checks prior calendar meetings.
  - action: connector.calendar.modify_*
    mode: deny
    reason: Contact investigation must never mutate calendar state.
  - action: connector.linkedin.read_dataset
    mode: allow
    reason: The LinkedIn dataset is a local read-only enrichment source.
  - action: prompts.*
    mode: deny
    reason: Runtime workflows must never modify prompts.
  - action: policies.*
    mode: deny
    reason: Runtime workflows must never modify policies.
