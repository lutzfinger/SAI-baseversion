policy_id: email_tagging
version: "1"
description: Gmail classification-and-tagging workflow. Reads Gmail and applies strict SAI labels to threads.
default_mode: deny
redaction:
  snippet_max_chars: 160
  full_redaction_keys:
    - access_token
    - authorization
    - cookie
    - cookies
    - password
    - refresh_token
    - token
  masked_email_keys:
    - bcc
    - cc
    - email
    - from_email
    - sender
    - to
  truncated_keys:
    - body
    - body_excerpt
    - reasoning
    - snippet
    - subject
  input_guard:
    fail_closed: false
    max_snippet_chars_for_llm: 500
    max_body_chars_for_llm: 1500
  output_guard:
    max_reason_chars: 240
    enforce_message_id_match: true
  evaluator:
    key: classification_consistency
gmail:
  allowed_env_keys:
    credentials_path: SAI_GMAIL_CREDENTIALS_PATH
    client_id: SAI_GMAIL_CLIENT_ID
    client_secret: SAI_GMAIL_CLIENT_SECRET
    refresh_token: SAI_GMAIL_REFRESH_TOKEN
    token_path: SAI_GMAIL_TAGGING_TOKEN_PATH
  default_token_filename: gmail_tagging_token.json
  allowed_mailbox_domains:
    - example_user.com
  allowed_mailbox_accounts:
    - someone@example.com
  allowed_scopes:
    - https://www.googleapis.com/auth/gmail.modify
linkedin:
  allowed_env_keys:
    dataset_path: SAI_LINKEDIN_DATASET_PATH
rules:
  - action: connector.gmail.authenticate
    mode: allow
    reason: Explicit local OAuth is required before Gmail tagging can run.
  - action: connector.gmail.read_metadata
    mode: allow
    reason: Classification needs Gmail metadata.
  - action: connector.gmail.read_snippet
    mode: allow
    reason: Classification needs Gmail snippets.
  - action: connector.gmail.read_body
    mode: allow
    reason: Classification needs bounded Gmail body excerpts.
  - action: connector.gmail.read_history
    mode: allow
    reason: Other-to-personal routing checks prior Gmail contact history before leaving a human thread in Other.
  - action: connector.linkedin.read_dataset
    mode: allow
    reason: Other-to-personal routing may consult the local LinkedIn export as weak relationship evidence.
  - action: connector.gmail.modify_labels
    mode: allow
    reason: This workflow exists specifically to apply taxonomy labels and remove INBOX after tagging.
  - action: prompts.*
    mode: deny
    reason: Runtime workflows must never modify prompts.
  - action: policies.*
    mode: deny
    reason: Runtime workflows must never modify policies.
