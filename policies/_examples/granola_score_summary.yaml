policy_id: granola_score_summary
version: "1"
description: Post daily and weekly Granola coaching score summaries to Slack.
default_mode: deny
slack:
  allowed_channel_names:
    - #general
rules:
  - action: connector.slack.authenticate
    mode: allow
    reason: Score summaries are delivered to Slack.
  - action: connector.slack.read_channel_metadata
    mode: allow
    reason: Slack channel resolution may require metadata lookup.
  - action: connector.slack.post_message
    mode: allow
    reason: The workflow posts one controlled score summary to Slack.
