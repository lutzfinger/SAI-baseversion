name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run boundary linter
        run: python scripts/boundary_check.py

  framework-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
      - name: Skill protocol + cascade framework + canonical loaders
        run: |
          python -m pytest -n auto \
            tests/test_cascade_runner.py \
            tests/test_cascade_framework_e2e.py \
            tests/test_proposal_intake.py \
            tests/test_proposal_apply_eval_add.py \
            tests/canonical/
