workflow_id: cost-compiler-agent
version: "1"
description: |
  Execution plane behind the cost-compiler trigger. The operator types
  free-form text — Slack message, email subject+body, or CLI prompt —
  and this agent translates it into a proposed atomic-step plan + a
  matched QB customer + a confirmed trip window. The agent has a
  guarded tool surface: read-only inspectors (QB customer lookup,
  Google Calendar peek, overlay metadata) plus ONE propose-only tool
  that stages the plan for the operator's approval gate.

  The agent never mutates QB. Every plan it proposes goes through the
  existing `await-approval` two-phase commit before any Purchase or
  Invoice is created.

  Pattern mirrored from `app/agents/sai_eval_agent.surface.yaml` —
  see a future plan for promotion path to a framework
  primitive once multiple skills need a trigger-to-plan agent.

# Per principle #24a (Open framework, single API surface) we use the
# operator's existing Anthropic key. Direct Anthropic SDK rather than
# LangChain — the slack-eval agent uses LangChain because it's part
# of the SAI v8 framework cascade; a skill-local agent is simpler with
# the Anthropic tool_use API directly. Future framework promotion can
# wrap this in LangChain.
framework: anthropic_sdk
provider: anthropic
default_model: claude-haiku-4-5
fallback_models: [claude-sonnet-4-5]

worker: skill_runner
connector: anthropic_api
policy: skill.yaml#policy

cascade:
  - tier_id: llm_agent
    description: |
      Direct Anthropic SDK tool-use loop. Receives the operator's
      trigger text + the tool surface + a system prompt. Caps at
      MAX_ITERATIONS=6 to prevent runaway loops.
    handles:
      - free-form trigger text in any phrasing
      - explicit date ranges ("May 5–18, 2026")
      - bare month references ("May 2026")
      - customer hints by partial name ("INSEAD trip", "the Cornell run")
      - scope qualifiers ("just airfare and hotels", "all costs")
      - currency overrides ("bill in EUR", "USD invoice")
    abstain_on:
      - empty / off-topic text → agent replies with a friendly redirect
      - customer hint with no QB match → agent asks operator to clarify
      - iteration cap reached → fall back to deterministic parse_trigger.parse

  - tier_id: rules_fallback
    description: |
      Deterministic `parse_trigger.parse` runs ONLY when the LLM tier
      is unreachable (no API key, daily LLM cap exceeded, network
      down). Per principle #29 (fault-tolerant cascade) — never crash
      because the upstream LLM is unavailable.
    handles:
      - LLM unavailable (no key, cap hit, network down)

# Tool surface — exhaustive list. Adding a tool requires editing this
# file AND wiring it in lib/cost_compiler_tools.py.
tools:
  - tool_id: list_qb_customers
    rights: read_only
    blast_radius: |
      Reads up to 50 QB customer display names + IDs + default
      currency via `qb_client.list_customers`. No mutation.
    inputs:
      contains: "Optional case-insensitive substring filter on DisplayName (max 64 chars)"
    outputs:
      customers: "list of {Id, DisplayName, currency}"
    input_check: "contains bounded to 64 chars"
    output_check: "max 50 customers returned"

  - tool_id: search_calendar_events
    rights: read_only
    blast_radius: |
      Reads Google Calendar events between start/end (max 90-day
      span, max 100 events). Read-only Calendar scope. Used to
      confirm a trip window the operator only hinted at.
    inputs:
      start_iso: "Start date YYYY-MM-DD"
      end_iso: "End date YYYY-MM-DD (must be >= start_iso, within 90 days)"
      keyword: "Optional case-insensitive summary filter (max 64 chars)"
    outputs:
      events: "list of {id, summary, location, start, end}"
    input_check: "ISO dates parse-checked; window <= 90 days; keyword bounded"
    output_check: "max 100 events returned; full descriptions stripped"

  - tool_id: list_payment_accounts
    rights: read_only
    blast_radius: |
      Lists the overlay's `payment_accounts.*.id/label/last4`.
      Pure overlay read; no QB call, no network.
    inputs: {}
    outputs:
      accounts: "list of {id, label, last4}"
    input_check: "no input"
    output_check: "all keys present; nothing else"

  - tool_id: list_expense_accounts
    rights: read_only
    blast_radius: |
      Lists the overlay's `expense_accounts.*` so the agent knows
      what scope_categories are valid for this operator.
    inputs: {}
    outputs:
      accounts: "list of {key, id, name}"
    input_check: "no input"
    output_check: "all keys present"

  - tool_id: propose_plan
    rights: propose_only
    blast_radius: |
      Writes ONE staged plan to
      `<overlay>/trip_runs/<trip_slug>/proposed_plan.json` and
      returns an operator-facing message. NO QB writes. The
      operator's `await-approval` step gates whether the plan
      then executes.
    target_system: cost_compiler_plan
    eval_dataset_to_update: workflow_regression
    inputs:
      trip_slug: "matches /^[a-z0-9]+-[0-9]{4}-[0-9]{2}$/"
      customer_id: "QB Customer.Id (must come from list_qb_customers)"
      customer_name: "QB Customer.DisplayName"
      currency: "ISO 4217 (USD, EUR, GBP, CHF, CAD, JPY)"
      start_date: "YYYY-MM-DD"
      end_date: "YYYY-MM-DD"
      scope_categories: "Optional list of category keys from list_expense_accounts; empty = all"
      summary: "One-paragraph rationale shown to the operator"
    outputs:
      proposal_id: "string matching /^plan::/"
      staged_path: "absolute path to proposed_plan.json"
      operator_message: "human-readable summary the surface runner posts back"
    input_check: |
      trip_slug regex; ISO dates; start <= end; currency in {USD, EUR, GBP, CHF, CAD, JPY};
      customer_id must have been returned by list_qb_customers earlier in this invocation
    output_check: "proposal_id matches /^plan::/; staged_path exists"

# Agent supervisory layer — applies between handoffs.
supervisory:
  iteration_cap: 6
  audit_log: |
    ~/Library/Logs/SAI/cost_compiler_agent.jsonl — one row per
    invocation. Captures input, all tool calls + their results, final
    text, cost_usd, iterations, terminated_reason, model_used.
  hard_refusals_in_system_prompt:
    - "off-topic input (jokes, trivia) → friendly refuse + redirect"
    - "no QB customer match for the operator's hint → ask for clarification, do NOT guess"
    - "ambiguous window (no dates AND no calendar match) → ask the operator"
    - "any QB Purchase / Invoice mutation → propose_plan is the only state-staging tool"

eval:
  canaries: canaries.jsonl
  workflow_regression: workflow_regression.jsonl

env:
  ANTHROPIC_API_KEY:
    required: true
    description: |
      Resolved at runtime from 1Password via overlay's
      `secrets.anthropic.{op_item, op_vault, field}`. The skill
      carries no operator-specific 1Password naming.
  SAI_COST_COMPILER_AGENT_MODEL:
    default: "claude-haiku-4-5"
    description: |
      Override the Claude model used by the agent. Set to a
      `sonnet` model temporarily when reproducing iteration-cap
      hits to see if a stronger reasoner closes the loop faster.
