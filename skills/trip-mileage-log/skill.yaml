schema_version: "1"

identity:
  workflow_id: trip-mileage-log
  version: "0.1.0"
  owner: framework
  description: |
    Deterministic SAI workflow. From "yesterday I went to Berkeley" / "I am
    going to Berkeley" it finds the date row in the operator's mileage Google
    Sheet, reads that day's Google Calendar to determine where they drove (one
    place, or a two-stop chained loop home->A->B->home), confirms it was a DRIVE
    not a flight (no airport booking and no flight calendar event), looks up
    round-trip miles from the workbook's "Distance MTV to" tab, and STAGES an
    approval proposal to write column H (miles), I (100% business) and J
    (reason). The real sheet write happens only in send_tool.py after operator
    approval, behind a kill-switch that defaults OFF. Values-free: home, sheet
    URL, tab gids and the kill-switch name come from the private config
    config/trip_mileage.yaml (PRINCIPLES §17/§18). Fail-closed on: unparseable
    date, no date row, ambiguous/missing destination, flight day, B!=F
    relocation, an unknown distance or inter-stop leg (asks the operator), and
    an already-filled row (unless overwrite is confirmed).

trigger:
  kind: claude_tool
  config:
    invocation: "python skills/trip-mileage-log/runner.py --utterance '...' --today YYYY-MM-DD"

cascade:
  - tier_id: validate_inputs
    kind: rules
    config:
      requires: ["utterance|explicit_date", "config"]
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0
  - tier_id: read_context
    kind: rules
    config:
      reads: ["google_calendar:day_events", "google_sheet:time_tracking_row", "google_sheet:distance_tab"]
      home: "from config.home_label"
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0
  - tier_id: not_flying_gate
    kind: rules
    config:
      flight_signals: ["airport_cols_C_D", "flight_calendar_event"]
      note: "column G (Travel Day) is NOT used — it is TRUE on local drive days too"
      also_blocks: "B!=F relocation (not a clean home round trip)"
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0
  - tier_id: resolve_distance
    kind: rules
    config:
      destinations: "google calendar day events -> normalized places"
      miles: "single = round trip; two = rt(A)/2 + leg(A,B) + rt(B)/2 (one-way ~= round-trip/2)"
      on_miss: "fail closed and ask the operator for the round-trip / leg miles"
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0
  - tier_id: overwrite_gate
    kind: rules
    config:
      refuse_if: "H/I/J already populated and confirm_overwrite not set"
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0
  - tier_id: build_draft
    kind: rules
    config:
      writes_preview: ["H=miles", "I=100", "J=reason"]
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0
  # PRINCIPLES §2/§9: the external sheet mutation stages a proposal for the
  # operator. send_tool.py performs the actual write after approval, behind a
  # kill switch that defaults OFF.
  - tier_id: human
    kind: human
    config:
      channel: sai-eval
    confidence_threshold: 1.0
    cost_cap_per_call_usd: 0.0

tools: []

eval:
  datasets:
    - kind: canaries
      path: canaries.jsonl
      min_count: 3
      fail_mode: hard_fail
    - kind: edge_cases
      path: edge_cases.jsonl
      min_count: 6
      cap: 50
      metric: accuracy
      max_p_r_drop: 0.10
      fail_mode: soft_fail
    - kind: workflow
      path: workflow_regression.jsonl
      min_count: 3
      fail_mode: hard_fail

feedback:
  channel: sai-eval
  patterns:
    - add_rule
    - eval_add

outputs:
  - name: mileage_row_write
    side_effect: external_write     # writes H/I/J on the date row
    requires_approval: true         # §2/§9 external mutation gates by default
  - name: distance_tab_append
    side_effect: external_write     # remembers a newly-supplied distance
    requires_approval: true
  - name: proposal_staged
    side_effect: none               # local YAML proposal for operator review
    requires_approval: false

policy:
  approval_required: true
  cost_cap_per_invocation_usd: 0.0
  iteration_cap: 1
  daily_invocation_cap: 50
  audit_log_path: "~/Library/Logs/SAI/trip-mileage-log.jsonl"

observability:
  langsmith_project: SAI
  metrics_emit: true
