workflow_id: newsletter-identification-gmail-tagging
version: "1"
description: Identify newsletters in Gmail and apply starter labels.
worker: newsletter_identifier
connector: gmail
connector_config:
  query: in:inbox
  label_ids:
    - INBOX
  max_results: 100
policy: newsletter_tagging.yaml
tags:
  - starter
  - email
  - newsletter
  - tagging
tools:
  - tool_id: keyword_classifier
    kind: keyword_classifier
    prompt: email/keyword-classify.md
  - tool_id: local_llm_classifier
    kind: local_llm_classifier
    prompt: email/llm-classify-local.md
    provider: ollama
  - tool_id: cloud_llm_classifier
    kind: cloud_llm_classifier
    prompt: email/llm-classify-cloud.md
    provider: openai
    model: gpt-5.2
  - tool_id: consistency_evaluator
    kind: consistency_evaluator
  - tool_id: gmail_thread_tagger
    kind: gmail_thread_tagger
