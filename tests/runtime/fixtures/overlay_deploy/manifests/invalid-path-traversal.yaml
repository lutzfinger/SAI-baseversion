schema_version: "2"

identity:
  workflow_id: sample-alpha-bad-2
  version: "0.1.0"
  owner: framework-tests
  description: "files[] contains a path outside the skill dir — validator must refuse."

profiles:
  claude_code:
    enabled: true
    files:
      - SKILL.md
      - "../../../../etc/passwd"   # traversal attempt; must be refused
    deploy_to: [claude_code]
    eval:
      datasets:
        - { kind: canaries, path: profiles/claude_code/canaries.jsonl, fail_mode: hard_fail, min_count: 1 }
