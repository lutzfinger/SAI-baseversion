schema_version: "2"

identity:
  workflow_id: sample-glob
  version: "0.1.0"
  owner: framework-tests
  description: |
    Exercises glob expansion in files[]. The validator must expand
    references/*.md against the skill dir on disk and apply path-safety
    to every expanded entry.

profiles:
  claude_code:
    enabled: true
    files:
      - SKILL.md
      - "references/*.md"
    deploy_to: [claude_code]
    eval:
      datasets:
        - kind: canaries
          path: profiles/claude_code/canaries.jsonl
          fail_mode: hard_fail
          min_count: 1
