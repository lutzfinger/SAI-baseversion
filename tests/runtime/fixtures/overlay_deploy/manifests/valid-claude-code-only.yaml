schema_version: "2"

identity:
  workflow_id: sample-alpha
  version: "0.1.0"
  owner: framework-tests
  description: |
    Minimal Claude-Code-only skill used to exercise the schema validator.

profiles:
  claude_code:
    enabled: true
    files:
      - SKILL.md
