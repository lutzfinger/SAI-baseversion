schema_version: "2"

identity:
  workflow_id: sample-alpha
  version: "0.1.0"
  owner: framework-tests
  description: |
    Synthetic single-profile (claude_code) skill used by PR 2 / PR 4 to
    exercise the `deploy --target claude_code` and `deploy --target cowork`
    code paths end-to-end.

profiles:
  claude_code:
    enabled: true
    files:
      - SKILL.md
      - references/note.md
    deploy_to: [claude_code, cowork]
    eval:
      datasets:
        - kind: canaries
          path: profiles/claude_code/canaries.jsonl
          fail_mode: hard_fail
          min_count: 1
