# Channel allowed-discussion registry — per PRINCIPLES.md §16i.
#
# Each guarded interface (Slack channel today; future HTTP / web)
# declares what topics it can discuss + what risk class each topic
# carries. The bot looks up the channel in this registry on EVERY
# message before invoking any tool. Topics not in the allowlist get
# a friendly refusal (per #16e — never silent).
#
# Default for new channels: allowed_topics: [] — refuse everything
# until the operator explicitly adds entries.
#
# Editable ONLY via Claude Code (per #16e — high-risk surface, off
# Slack/web). Boundary linter catches accidental real channel names
# leaking into the public template.
#
# ── Risk classes (drive gating policy) ────────────────────────────
#   minimal    — read-only; no second-opinion gate
#   low        — propose-only with two-phase commit; existing apply gate
#   medium     — propose-only + second-opinion gate (#16f) on local LLM
#   high       — propose-only + second-opinion gate on cloud LLM + operator approval
#   forbidden  — explicitly NOT allowed; refuse + log

version: "2026-05-03"

channels:

  # The current operator-feedback channel for Loop 4 + Loop 2 batch
  # asks. Hosts the sai-eval agent + the cornell-delay-triage
  # approval flow (operator ✅/❌ on staged reply proposals).
  sai-eval:
    description: "Operator-driven taxonomy + LLM eval feedback + e1 approvals"
    allowed_topics:
      - kind: classifier_rule_change
        risk_class: low
        tools:
          - propose_classifier_rule
        description: "Add or remove a sender→bucket classifier rule"
      - kind: llm_example_addition
        risk_class: low
        tools:
          - propose_llm_example
          - search_gmail
          - read_message
          - read_thread
        description: "Add a one-off LLM teaching example for a specific email"
      - kind: query_label_state
        risk_class: minimal
        tools:
          - list_gmail_labels
        description: "Read-only query of which Gmail labels currently exist"
      - kind: cornell_delay_approval
        risk_class: high
        tools:
          - apply_label
          - send_approved_reply
          - archive_thread
        description: "Operator ✅/❌ on a staged cornell-delay-triage reply proposal. High risk: approval triggers an outbound email."

  # Synthetic channel name for a 1-on-1 DM between the SAI bot and the
  # configured operator (SAI_OPERATOR_USER_ID). The bot's
  # _resolve_channel_name() returns "_dm_operator" for DMs where the
  # partner matches the operator user_id; any other DM resolves to None
  # (silently refused per #16i fail-closed default). This is the
  # COMMAND channel — operator tells SAI to DO things here. Eval
  # feedback ("rule add", LLM example corrections) belongs in sai-eval,
  # NOT here.
  _dm_operator:
    description: "1-on-1 DM with the configured operator. Command surface — operator triggers skills here CONVERSATIONALLY (PRINCIPLES.md §16f agent execution plane). Identity-bound by definition (DMs are 1-on-1 with the bot, partner == SAI_OPERATOR_USER_ID enforced in _resolve_channel_name)."
    allowed_topics:
      - kind: skill_run_invocation
        risk_class: high
        tools:
          - list_available_skills      # read_only — agent inspects what skills exist
          - propose_skill_run           # propose_only — stages YAML for ✅
        description: "Operator describes what they want in natural language (e.g. 'check student participation for the C-Suites class, sheet https://...'). The DM agent (app/agents/sai_operator_dm_agent.py) reads intent via cloud LLM (the #24b agent_default role), asks clarifying questions if params are missing, and on confirmed intent calls `propose_skill_run` which invokes the skill cascade. The cascade's final `human` tier stages a YAML proposal at ~/.sai-runtime/eval/proposed/<workflow_id>/<thread_id>.yaml. Operator reacts ✅ on the bot's reply message → _dispatch_staged_proposal_reaction → skill_apply_registry → skill's send_tool.apply_approved_proposal fires the actual side effect (Google Sheet write, etc.). Per-skill kill-switch env vars default OFF. Five gates of #9 enforced: channel-bound (synthetic channel only resolves for operator's DM), identity-bound (operator_user_id at message time + DM partner check), pattern-bound (LLM tool schema), two-phase commit (proposal + ✅), hash-aware (overlay merge re-hashes prompt + manifest). Follow-up: add local-LLM Tier-1 (Ollama, the cascade_local role) with cloud as Tier-2 fallback per #12 cascade; hash-lock the agent's system prompt per #24c; ship canaries per #16d every workflow same shape."

  # PLACEHOLDER — will host the sai-cost dashboard agent. Reserved
  # NOW so adding it later is just enabling, not designing-from-scratch.
  sai-cost:
    description: "Cost reporting + budget queries (read-only)"
    allowed_topics:
      - kind: cost_query
        risk_class: minimal
        tools:
          - read_audit_log
          - format_cost_report
        description: "Read-only cost report query (per workflow / per day / per provider)"

  # PLACEHOLDER — will host the sai-metrics dashboard agent.
  sai-metrics:
    description: "Eval / regression / quality metrics (read-only)"
    allowed_topics:
      - kind: metric_query
        risk_class: minimal
        tools:
          - read_audit_log
          - read_eval_metrics
          - format_report
        description: "Read-only metric query (P/R, regression status, dataset health)"

  # RAG retrieval channel. Operator types a question; the agent
  # queries the operator's RAG index (e.g. their writing corpus,
  # course materials, archived briefings) and returns top-N relevant
  # passages with source citations. Read-only — no proposals, no
  # external side effects.
  sai-rag:
    description: "Question / answer over the operator's private RAG index (read-only)"
    allowed_topics:
      - kind: rag_query
        risk_class: low
        tools:
          - query_rag
          - list_rag_collections
        description: "Run a similarity query against a configured RAG collection. Returns top-N passages with source paths. The operator's question + the agent's distilled answer go to the channel; underlying chunks are read-only retrieval. Risk class is low (not minimal) because the retrieval surfaces operator-private content; the channel itself is the access-control boundary."

# New channels added below. Until an entry exists here, the bot
# refuses every message on that channel — even if the operator types
# in it. This is the fail-closed default for #16i.
